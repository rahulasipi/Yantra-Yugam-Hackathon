<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IteraGen — Sign in</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="signin-body">
    <div class="signin-shell">
      <div class="signin-brand">
        <div class="brand-mark">
          <img src="/logo.jpeg" alt="IteraGen" width="40" height="40" />
        </div>
        <div>
          <h1 class="signin-title">IteraGen</h1>
          <p class="signin-tagline">Prompt-to-app studio with trust insights</p>
        </div>
      </div>

      <div class="signin-card panel">
        <h2 class="signin-heading">Sign in to continue</h2>
        <p class="inline-hint">Use your email and password. Your session stays in this browser tab until you sign out.</p>

        <div class="tabs">
          <button type="button" class="tab active" data-tab="in">Sign in</button>
          <button type="button" class="tab" data-tab="up">Create account</button>
        </div>

        <form id="form-login" class="form-stack signin-form" autocomplete="on">
          <label class="field-label" for="login-email">Email</label>
          <input id="login-email" type="email" name="email" placeholder="you@example.com" required />
          <label class="field-label" for="login-password">Password</label>
          <input id="login-password" type="password" name="password" placeholder="Password" required />
          <button type="submit" class="btn btn-primary btn-signin-submit">Sign in</button>
        </form>

        <form id="form-register" class="form-stack signin-form" style="display: none" autocomplete="on">
          <label class="field-label" for="reg-name">Display name</label>
          <input id="reg-name" type="text" name="name" placeholder="Your name" />
          <label class="field-label" for="reg-email">Email</label>
          <input id="reg-email" type="email" name="email" placeholder="you@example.com" required />
          <label class="field-label" for="reg-password">Password</label>
          <input id="reg-password" type="password" name="password" placeholder="At least 8 characters" required minlength="8" />
          <button type="submit" class="btn btn-violet btn-signin-submit">Create account</button>
        </form>

        <p id="auth-msg" class="flash-msg" role="status"></p>
      </div>

      <p class="signin-foot"><small>JWT session · Sign out clears your token from this tab</small></p>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/signin.js"></script>
  </body>
</html>
